<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360">
  <!-- FCF Monogram — Foz Cidade em Foco -->

  <!-- LEFT F -->
  <!-- Vertical bar -->
  <rect x="20" y="20" width="52" height="260" fill="#4285F4"/>
  <!-- Top horizontal bar -->
  <rect x="20" y="20" width="145" height="52" fill="#4285F4"/>
  <!-- Middle horizontal bar -->
  <rect x="20" y="128" width="108" height="46" fill="#4285F4"/>

  <!-- CENTER C (ring with opening) -->
  <!-- Outer circle -->
  <circle cx="260" cy="150" r="130" fill="#4285F4"/>
  <!-- Inner hole -->
  <circle cx="260" cy="150" r="76" fill="white"/>
  <!-- Opening cut (top-left diagonal — makes C shape) -->
  <polygon points="152,38 220,38 220,108 152,108" fill="white"/>
  <!-- Smooth the cut with a small arc shape -->
  <path d="M152,40 Q186,20 220,38 L220,108 Q186,90 152,108 Z" fill="white"/>

  <!-- RIGHT F (mirrored) -->
  <!-- Vertical bar -->
  <rect x="448" y="20" width="52" height="260" fill="#4285F4"/>
  <!-- Top horizontal bar -->
  <rect x="355" y="20" width="145" height="52" fill="#4285F4"/>
  <!-- Middle horizontal bar -->
  <rect x="392" y="128" width="108" height="46" fill="#4285F4"/>

  <!-- Tagline -->
  <text
    x="260" y="318"
    text-anchor="middle"
    font-family="Inter, Arial, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="5"
    fill="#9EADD4"
  >FOZ CIDADE EM FOCO</text>
</svg>
